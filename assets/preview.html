<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Embedded Tweet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        .tweet-wrapper {
            width: 100%;
            max-width: 550px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .post-url {
            margin-top: 16px;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            word-break: break-all;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 9999px;
            display: none;
            max-width: 100%;
        }
    </style>
</head>
<body>

<div class="tweet-wrapper">
    <blockquote class="twitter-tweet" data-theme="dark">
        <a id="tweet-link" href="https://x.com/zubilubit/status/2074081634094121318?s=20"></a>
    </blockquote>
    <div id="post-url-display" class="post-url"></div>
</div>

<script>
    (function () {
        var params = new URLSearchParams(window.location.search);
        var url = params.get("url");
        if (url) {
            document.getElementById("tweet-link").href = url;
            const cleanUrl = url.replace("twitter.com", "x.com").split("?")[0];
            const displayEl = document.getElementById("post-url-display");
            if (displayEl) {
                displayEl.textContent = cleanUrl;
                displayEl.style.display = "inline-block";
            }
        }
    })();
</script>
<script async src="https://platform.x.com/widgets.js"></script>

</body>
</html>
