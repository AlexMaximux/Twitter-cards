<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Embedded Tweet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
        }

        .tweet-wrapper {
            width: 100%;
            max-width: 550px;
            padding: 24px;
        }
    </style>
</head>
<body>

<div class="tweet-wrapper">
    <blockquote class="twitter-tweet" data-theme="dark">
        <a id="tweet-link" href="https://x.com/zubilubit/status/2074081634094121318?s=20"></a>
    </blockquote>
</div>

<script>
    (function () {
        var params = new URLSearchParams(window.location.search);
        var url = params.get("url");
        if (url) document.getElementById("tweet-link").href = url;
    })();
</script>
<script async src="https://platform.x.com/widgets.js"></script>

</body>
</html>
